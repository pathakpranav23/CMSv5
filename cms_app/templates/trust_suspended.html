{% extends "layout.html" %}
{% block content %}
<div class="container py-5" style="max-width:720px;">
  <div class="card shadow-sm border-danger">
    <div class="card-body">
      <h3 class="mb-2 text-danger">Trust Suspended</h3>
      <p class="text-muted mb-3">This trust is currently suspended by Super Admin.</p>
      <div class="mb-3">
        <div><span class="fw-semibold">Trust:</span> {{ trust.trust_name }}</div>
        {% if trust.suspended_reason %}<div class="text-muted small mt-1">{{ trust.suspended_reason }}</div>{% endif %}
      </div>
      <div class="alert alert-warning mb-0">Please contact support to reactivate your subscription.</div>
    </div>
  </div>
</div>
{% endblock %}
